      responses:
        '202':
          description: Парсинг запущен
        '401':
          description: Не авторизован
        '403':
          description: Недостаточно прав (только Администратор)
        '409':
          description: Предыдущий запуск ещё не завершён

  /demo/admin/parsing/run/{vaccine_id}:
    post:
      tags: ["[Демо] Админка — Парсинг"]
      summary: Проверить обновление вакцины (демо)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: vaccine_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                  enum: [OHLP, GRLS]
                  default: OHLP
      responses:
        '202':
          description: Парсинг для вакцины запущен
        '401':
          description: Не авторизован
        '403':
          description: Недостаточно прав (только Администратор)
        '404':
          description: Вакцина не найдена
        '409':
          description: Предыдущий запуск ещё не завершён

  /demo/admin/parsing/queue:
    get:
