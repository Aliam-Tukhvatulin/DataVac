components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ---------- Поиск ----------
    SearchResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/VaccineSearchItem'

    VaccineSearchItem:
      type: object
      properties:
        vaccine_id:
          type: integer
        vaccine_name_short:
          type: string
        vaccine_name_long:
          type: string
        infections:
          type: array
          items:
            $ref: '#/components/schemas/InfectionBrief'
        route_of_administration:
          type: string
        contraindications:
          type: array
          items:
            $ref: '#/components/schemas/ContraindicationBrief'
        age_range:
          type: string
        pregnancy_breastfeeding_info:
          type: string
        availability_status:
          type: string
          enum: [Доступна, Недоступна]

    SuggestionsResponse:
      type: object
      properties:
        vaccines:
          type: array
          items:
            $ref: '#/components/schemas/SuggestionItem'
        infections:
          type: array
          items:
            $ref: '#/components/schemas/SuggestionItem'
        contraindications:
          type: array
          items:
            $ref: '#/components/schemas/SuggestionItem'
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/SuggestionItem'

    SuggestionItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    # ---------- Вакцины ----------
    VaccineListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/VaccineSearchItem'

